services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app2_php
    restart: unless-stopped
    volumes:
      - .:/var/www/app2
    environment:
      - APP_ENV=${APP_ENV:-local}
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
    networks:
      - infra_network
      - app2_network
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app2_worker
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/app2
    environment:
      - APP_ENV=${APP_ENV:-local}
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
    networks:
      - infra_network
      - app2_network
    depends_on:
      - php
      - redis

  redis:
    image: redis:latest
    container_name: app2_redis
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    networks:
      - app2_network

networks:
  app2_network:
    name: app2_network
    driver: bridge
  infra_network:
    external: true
    name: infra_network